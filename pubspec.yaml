name: publish_tools
description: A set of tasks the enhance the pub.dev publishing experience.  With a single command push to GitHub, pub.dev and even Homebrew.
version: 1.0.1+1
homepage: https://github.com/faithoflifedev/publish_tools
repository: https://github.com/faithoflifedev/publish_tools

funding:
  - https://www.buymeacoffee.com/faithoflif2

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  crypto: ^3.0.7
  git: ^2.3.2
  github: ^9.25.0
  grinder: ^0.9.5
  http: ^1.6.0
  json_annotation: ^4.11.0
  mustache_template: ^2.0.4
  path: ^1.9.1
  pubspec_parse: ^1.5.0
  recase: ^4.1.0
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.13.1
  json_serializable: ^6.13.1
  lints: ^6.1.0
  test: ^1.31.0
